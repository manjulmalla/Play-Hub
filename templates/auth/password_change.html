{% extends "base.html" %}

{% block title %}Change Password - PlayHub{% endblock %}

{% block content %}
<div class="sv-form-card">
    <h1 class="h3 mb-3"><i class="bi bi-shield-lock sv-accent"></i> Change Password</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
            </div>
        {% endfor %}
        <button type="submit" class="btn sv-btn-accent">Update Password</button>
    </form>
</div>
{% endblock %}
