{% extends "base.html" %}

{% block title %}Reset Password - PlayHub{% endblock %}

{% block content %}
<div class="sv-form-card">
    <h1 class="h3 mb-3 text-center"><i class="bi bi-key sv-accent"></i> Reset Password</h1>
    <p class="sv-muted text-center">Enter your email address and we'll send you a link to reset your password.</p>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label" for="id_email">Email</label>
            {{ form.email }}
        </div>
        <button type="submit" class="btn sv-btn-accent w-100">Send Reset Link</button>
    </form>
    <div class="text-center mt-3 sv-muted"><a href="{% url 'accounts:login' %}">Back to login</a></div>
</div>
{% endblock %}
