{% extends "base.html" %}

{% block title %}Email Sent - PlayHub{% endblock %}

{% block content %}
<div class="sv-form-card text-center">
    <i class="bi bi-envelope-check" style="font-size:3rem; color:var(--sv-accent);"></i>
    <h1 class="h4 mt-3">Check your inbox</h1>
    <p class="sv-muted">We've emailed you instructions to reset your password. If it doesn't arrive soon, check your spam folder.</p>
    <a href="{% url 'accounts:login' %}" class="btn sv-btn-outline">Back to login</a>
</div>
{% endblock %}
