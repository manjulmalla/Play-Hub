{% extends "base.html" %}

{% block title %}Password Reset Complete - PlayHub{% endblock %}

{% block content %}
<div class="sv-form-card text-center">
    <i class="bi bi-check-circle" style="font-size:3rem; color:var(--sv-accent);"></i>
    <h1 class="h4 mt-3">Password reset complete</h1>
    <p class="sv-muted">Your password has been set. You can now log in with your new password.</p>
    <a href="{% url 'accounts:login' %}" class="btn sv-btn-accent">Login</a>
</div>
{% endblock %}
