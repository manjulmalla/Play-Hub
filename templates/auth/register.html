{% extends "base.html" %}

{% block title %}Sign Up - PlayHub{% endblock %}

{% block content %}
<div class="sv-form-card">
    <h1 class="h3 mb-3 text-center"><i class="bi bi-person-plus sv-accent"></i> Create Account</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
            </div>
        {% endfor %}
        <button type="submit" class="btn sv-btn-accent w-100">Register</button>
    </form>
    <div class="text-center mt-3 sv-muted">
        Already have an account? <a href="{% url 'accounts:login' %}" class="sv-accent">Login</a>
    </div>
</div>
{% endblock %}
