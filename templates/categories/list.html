{% extends "base.html" %}

{% block title %}Categories - PlayHub{% endblock %}

{% block content %}
<h1 class="h3 mb-4"><i class="bi bi-tags sv-accent"></i> Browse Categories</h1>
<div class="row g-3">
    {% for category in categories %}
        <div class="col-6 col-md-4 col-lg-3">
            <a href="{{ category.get_absolute_url }}" class="sv-stat-card d-block text-center h-100">
                <div class="sv-stat-icon" style="font-size:2rem;"><i class="{{ category.icon }}"></i></div>
                <div class="mt-2 fw-semibold">{{ category.name }}</div>
                {% if category.description %}<div class="sv-muted small mt-1">{{ category.description|truncatewords:10 }}</div>{% endif %}
            </a>
        </div>
    {% endfor %}
</div>
{% endblock %}
